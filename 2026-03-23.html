<style>
:root{--bg:#f0f2f5;--card:#fff;--title:#1a1a2e;--text:#444;--text2:#555;--text3:#888;--nav-bg:#fff;--nav-shadow:rgba(0,0,0,.1);--nav-link:#555;--nav-link-bg:#e2e8f0;--nav-link-hover:#cbd5e1;--nav-active:#1a1a2e;--sec-bg:#2d3436;--card-shadow:rgba(0,0,0,.08);--card-hover:rgba(0,0,0,.12);--img-bg:#e8eaed;--btn-bg:#1a1a2e;--tab-bg:#e2e8f0;--tab-active:#1a1a2e;--tab-text:#555;--tab-active-text:#fff}
[data-theme="dark"]{--bg:#1a1a2e;--card:#2d2d44;--title:#f0f0f8;--text:#c8c8d8;--text2:#e4e4f0;--text3:#a0a0b8;--nav-bg:#22223a;--nav-shadow:rgba(0,0,0,.3);--nav-link:#b0b0c8;--nav-link-bg:#33334d;--nav-link-hover:#44446a;--nav-active:#6c63ff;--sec-bg:#6c63ff;--card-shadow:rgba(0,0,0,.2);--card-hover:rgba(0,0,0,.35);--img-bg:#33334d;--btn-bg:#6c63ff;--tab-bg:#33334d;--tab-active:#6c63ff;--tab-text:#b0b0c8;--tab-active-text:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);padding:20px;padding-top:56px;max-width:1400px;margin:0 auto;transition:background .3s,color .3s}
.hd{text-align:center;padding:16px 0 8px}
.hd h1{font-size:22px;color:var(--title)}
.hd .st{color:var(--text);font-size:14px;margin-top:6px}
.sec{background:var(--sec-bg);color:#fff;padding:12px 20px;border-radius:8px;margin:20px 0 14px;font-size:17px;font-weight:600}
.g{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.c{background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 2px 6px var(--card-shadow);transition:transform .2s,box-shadow .2s,background .3s}
.c:hover{transform:translateY(-3px);box-shadow:0 6px 16px var(--card-hover)}
.c>a{display:block;text-decoration:none;color:inherit}
.iw{position:relative;width:100%;padding-top:62%;background:var(--img-bg);overflow:hidden}
.iw img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
.bd{position:absolute;top:8px;left:8px;background:#10b981;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;z-index:1}
.cb{padding:10px 12px 12px}
.ct{font-size:13px;font-weight:600;line-height:1.4;color:var(--title);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
.cz{font-size:12px;color:var(--text2);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:5px}
.cs{font-size:11px;color:var(--text3)}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--nav-bg);box-shadow:0 2px 8px var(--nav-shadow);text-align:center;padding:10px 0;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .3s}
.nav span{font-size:14px;color:var(--text)}
.nav a{display:inline-block;padding:5px 12px;margin:2px 3px;border-radius:16px;font-size:13px;text-decoration:none;color:var(--nav-link);background:var(--nav-link-bg);transition:all .2s}
.nav a:hover{background:var(--nav-link-hover)}
.nav a.cur{background:var(--nav-active);color:#fff}
.theme-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .2s}
.theme-btn:hover{background:var(--nav-link-bg)}
.tabs{display:flex;justify-content:center;gap:0;margin:16px auto 8px;background:var(--tab-bg);border-radius:12px;padding:4px;max-width:280px}
.tabs button{flex:1;padding:8px 20px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;background:transparent;color:var(--tab-text);transition:all .2s}
.tabs button.active{background:var(--tab-active);color:var(--tab-active-text);box-shadow:0 2px 6px rgba(0,0,0,.15)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.ph{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;padding:14px;text-align:center;line-height:1.3}
.top-btn{position:fixed;bottom:24px;right:24px;z-index:100;width:42px;height:42px;border-radius:50%;background:var(--btn-bg);color:#fff;border:none;font-size:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);display:none;align-items:center;justify-content:center;transition:opacity .2s,background .3s}
.top-btn:hover{opacity:.85}
@media(max-width:900px){.g{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.g{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<button class="top-btn" id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>
<script>
var b=document.getElementById('topBtn');
window.onscroll=function(){b.style.display=window.scrollY>300?'flex':'none'};
(function(){
  var html=document.documentElement;
  var saved=localStorage.getItem('theme');
  if(saved)html.setAttribute('data-theme',saved);
  else if(window.matchMedia('(prefers-color-scheme:dark)').matches)html.setAttribute('data-theme','dark');
  var icon=document.getElementById('themeIcon');
  if(icon)icon.textContent=(html.getAttribute('data-theme')==='dark')?'\ud83c\udf19':'\u2600\ufe0f';
  window._toggleTheme=function(){
    var cur=html.getAttribute('data-theme');
    var next=cur==='dark'?'light':'dark';
    if(next==='light')html.removeAttribute('data-theme');
    else html.setAttribute('data-theme',next);
    localStorage.setItem('theme',next);
    document.getElementById('themeIcon').textContent=next==='dark'?'\ud83c\udf19':'\u2600\ufe0f';
  };
  window._switchTab=function(tab,btn){
    document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});
    document.querySelectorAll('.tabs button').forEach(function(b){b.classList.remove('active')});
    document.getElementById('tab-'+tab).classList.add('active');
    btn.classList.add('active');
    localStorage.setItem('activeTab',tab);
    window.scrollTo({top:0});
  };
  var savedTab=localStorage.getItem('activeTab');
  if(savedTab&&document.getElementById('tab-'+savedTab)){
    var btns=document.querySelectorAll('.tabs button');
    btns.forEach(function(b){b.classList.remove('active');if(b.textContent.toLowerCase()===savedTab)b.classList.add('active')});
    document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});
    document.getElementById('tab-'+savedTab).classList.add('active');
  }
})();
</script>
